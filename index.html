<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Layout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>Blocks</h1>
            </header>
            <ul id="feed-list" class="block-list"></ul>
        </aside>

        <main class="main-content">
            <section class="weather-card">
                <div class="weather-card-inner" id="current-weather-card">
                    <h1 style="font-size:250%;"> <i>Greetings!</i> </h1>
                    <h2>Weather</h2>
                    <div class="weather-info">
                        <div class="temperature" id="current-temperature">n°C</div>
                        <div class="weather-details">
                            <p id="current-description">Description</p>
                            <p id="current-wind">Wind</p>
                            <p id="current-humidity">Feels like n°</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="forecast-section">
                <div class="weather-card-inner">
                    <h2>7-Day Forecast</h2>
                    <div class="forecast-grid" id="forecast-grid">
                        <div class="forecast-card"></div>
                        <div class="forecast-card"></div>
                        <div class="forecast-card"></div>
                        <div class="forecast-card"></div>
                        <div class="forecast-card"></div>
                        <div class="forecast-card"></div>
                    </div>
                </div>
            </section>

            <section class="misc-icons">
                <header>
                    <h2>Miscellaneous</h2>
                </header>
                <div class="icon-row">
                    <div class="icon-card">
                        <a href="gamblingsite.html">Gambling</a>
                    </div>
                    <div class="icon-card">
                        <a href="https://duckduckgo.com/">Google</a>
                    </div>
                    <div class="icon-card">
                        <a href="https://www.instagram.com/reels">Brainrot</a>
                    </div>
                    <div class="icon-card">Secret 4th Thing</div>
                </div>
            </section>
        </main>
    </div>
    <script src="Script.js" defer></script>
</body>

</html>
